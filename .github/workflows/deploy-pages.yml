name: Deploy site to GitHub Pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Publish the research dashboard + the EO monitor to the gh-pages
      # branch (Pages serves it: Settings -> Pages -> gh-pages / root).
      - name: Deploy to gh-pages
        run: |
          rm -rf /tmp/pub && mkdir -p /tmp/pub/eo-monitor
          cp -r site data REPORT.md index.html /tmp/pub/
          cp -r eo-monitor/site eo-monitor/data eo-monitor/index.html /tmp/pub/eo-monitor/
          touch /tmp/pub/.nojekyll
          cd /tmp/pub
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site $(date -u +%FT%TZ)"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages
