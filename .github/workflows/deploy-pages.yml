name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Publish to the gh-pages branch (pushing this branch auto-enables
      # GitHub Pages; the Actions token may not create a Pages site via API).
      - name: Deploy to gh-pages
        run: |
          rm -rf /tmp/pub && mkdir /tmp/pub
          cp -r site data REPORT.md index.html /tmp/pub/
          touch /tmp/pub/.nojekyll
          cd /tmp/pub
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site $(date -u +%FT%TZ)"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages
