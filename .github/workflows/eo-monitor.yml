name: EO Monitor - update observations

on:
  schedule:
    - cron: "43 5 * * *"   # daily, 05:43 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: eo-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: eo-monitor/requirements.txt

      - run: pip install -r requirements.txt
        working-directory: eo-monitor

      - run: python -m pytest tests/ -q
        working-directory: eo-monitor

      # A failed fetch (STAC hiccup, S3 outage) must not take the site down -
      # we still redeploy whatever observations are already committed.
      - name: Process new Sentinel-2 scenes
        id: pipeline
        continue-on-error: true
        working-directory: eo-monitor
        run: python -m pipeline.run --aoi all

      - name: Commit new observations
        if: steps.pipeline.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eo-monitor/data
          if ! git diff --cached --quiet; then
            git commit -m "EO observations $(date -u +%F)"
            git push
          else
            echo "No new observations."
          fi

      - name: Report pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: echo "::warning::pipeline failed - deploying previously committed data."

      # GITHUB_TOKEN pushes don't retrigger deploy-pages.yml, so publish here
      # too (same output layout as deploy-pages.yml).
      - name: Deploy to gh-pages
        run: |
          rm -rf /tmp/pub && mkdir -p /tmp/pub/eo-monitor
          cp -r site data REPORT.md index.html /tmp/pub/
          cp -r eo-monitor/site eo-monitor/data eo-monitor/index.html /tmp/pub/eo-monitor/
          touch /tmp/pub/.nojekyll
          cd /tmp/pub
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site $(date -u +%FT%TZ)"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages
